name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover tests -v
      - run: python -m compileall tg_downloader_ui tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build

  release-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tests/test_release_safety.py

  openwrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Default: generic + x86_64 full + meta. Also emit arm64 full for structural checks.
      - run: python scripts/build_openwrt_ipk.py --output-dir dist/openwrt --full-arch all
      - run: |
          test -f dist/openwrt/tg-downloader-ui_0.1.4_all.ipk
          test -f dist/openwrt/tg-downloader-ui-full_0.1.4_x86_64.ipk
          test -f dist/openwrt/tg-downloader-ui-full_0.1.4_aarch64_generic.ipk
          test -f dist/openwrt/app-meta-tg-downloader-ui_0.1.4-r1_all.ipk

          generic_root="$(mktemp -d)"
          full_root="$(mktemp -d)"
          arm_root="$(mktemp -d)"
          trap 'rm -rf "$generic_root" "$full_root" "$arm_root"' EXIT

          tar -xOf dist/openwrt/tg-downloader-ui_0.1.4_all.ipk ./data.tar.gz | tar -xz -C "$generic_root"
          PYTHONPATH="$generic_root/usr/lib/tg-downloader-ui/vendor" \
            python -c "import telethon, qrcode, rsa, pyasn1, pyaes"

          tar -xOf dist/openwrt/tg-downloader-ui-full_0.1.4_x86_64.ipk ./data.tar.gz | tar -xz -C "$full_root"
          test -x "$full_root/usr/bin/tdl"
          test -x "$full_root/usr/bin/tg-downloader-ui"
          test -f "$full_root/usr/share/licenses/tg-downloader-ui-full/tdl-AGPL-3.0.txt"
          test -f "$full_root/usr/share/licenses/tg-downloader-ui-full/tdl-NOTICE.txt"
          "$full_root/usr/bin/tdl" version | grep '0.20.3'

          # aarch64 full: structural extract only on amd64 runners (no qemu required).
          tar -xOf dist/openwrt/tg-downloader-ui-full_0.1.4_aarch64_generic.ipk ./control.tar.gz \
            | tar -xzO ./control | grep -E 'Architecture: aarch64_generic'
          tar -xOf dist/openwrt/tg-downloader-ui-full_0.1.4_aarch64_generic.ipk ./data.tar.gz \
            | tar -xz -C "$arm_root"
          test -x "$arm_root/usr/bin/tdl"
          test -x "$arm_root/usr/bin/tg-downloader-ui"
          test -f "$arm_root/usr/share/licenses/tg-downloader-ui-full/tdl-AGPL-3.0.txt"
          test -f "$arm_root/usr/share/licenses/tg-downloader-ui-full/tdl-NOTICE.txt"
          grep -F 'tdl_Linux_arm64.tar.gz' \
            "$arm_root/usr/share/licenses/tg-downloader-ui-full/tdl-NOTICE.txt"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      # Multi-arch verify only — never push from PR/main (see docker-publish.yml).
      - name: Multi-arch build (amd64 + arm64, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: tg-downloader-ui:ci-multi
          build-args: |
            TDL_VERSION=0.20.3
      # Native amd64 image for runtime smoke (tdl version).
      - name: amd64 smoke build and tdl version
        run: |
          docker build --build-arg TDL_VERSION=0.20.3 -t tg-downloader-ui:test .
          docker run --rm tg-downloader-ui:test tdl version
