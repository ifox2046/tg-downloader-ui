name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover tests -v
      - run: python -m compileall tg_downloader_ui tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build

  release-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tests/test_release_safety.py

  openwrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_openwrt_ipk.py --output-dir dist/openwrt
      - run: |
          test -f dist/openwrt/tg-downloader-ui_0.1.0_all.ipk
          test -f dist/openwrt/tg-downloader-ui-full_0.1.0_x86_64.ipk
          test -f dist/openwrt/app-meta-tg-downloader-ui_0.1.0-r1_all.ipk

          generic_root="$(mktemp -d)"
          full_root="$(mktemp -d)"
          trap 'rm -rf "$generic_root" "$full_root"' EXIT

          tar -xOf dist/openwrt/tg-downloader-ui_0.1.0_all.ipk ./data.tar.gz | tar -xz -C "$generic_root"
          PYTHONPATH="$generic_root/usr/lib/tg-downloader-ui/vendor" \
            python -c "import telethon, qrcode, rsa, pyasn1, pyaes"

          tar -xOf dist/openwrt/tg-downloader-ui-full_0.1.0_x86_64.ipk ./data.tar.gz | tar -xz -C "$full_root"
          test -x "$full_root/usr/bin/tdl"
          test -x "$full_root/usr/bin/tg-downloader-ui"
          test -f "$full_root/usr/share/licenses/tg-downloader-ui-full/tdl-AGPL-3.0.txt"
          test -f "$full_root/usr/share/licenses/tg-downloader-ui-full/tdl-NOTICE.txt"
          "$full_root/usr/bin/tdl" version | grep '0.20.3'

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg TDL_VERSION=0.20.3 -t tg-downloader-ui:test .
      - run: docker run --rm tg-downloader-ui:test tdl version
