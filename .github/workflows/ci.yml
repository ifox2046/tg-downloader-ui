name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover tests -v
      - run: python -m compileall tg_downloader_ui tests

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build

  release-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tests/test_release_safety.py

  openwrt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/build_openwrt_ipk.py --output-dir dist/openwrt
      - run: |
          vendor_root="$(mktemp -d)"
          trap 'rm -rf "$vendor_root"' EXIT
          tar -xOf dist/openwrt/tg-downloader-ui_0.1.0_all.ipk ./data.tar.gz | tar -xz -C "$vendor_root"
          PYTHONPATH="$vendor_root/opt/tg-downloader-ui/vendor" python -c "import telethon, qrcode, rsa, pyasn1, pyaes"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --build-arg TDL_VERSION=0.20.3 -t tg-downloader-ui:test .
      - run: docker run --rm tg-downloader-ui:test tdl version
