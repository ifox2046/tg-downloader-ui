name: Docker Publish

# Push multi-arch images to Docker Hub only on version tags / releases.
# Repository secrets required (never commit):
#   DOCKERHUB_USERNAME
#   DOCKERHUB_TOKEN
#
# Image: ifox2046/tg-downloader-ui
# Platforms: linux/amd64, linux/arm64 (same tags, multi-arch manifests)

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image version tag without leading v (e.g. 0.1.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE_NAME: ifox2046/tg-downloader-ui

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ inputs.tag }}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            raw="${{ github.event.release.tag_name }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          version="${raw#v}"
          if [ -z "${version}" ]; then
            echo "empty version from ref/tag" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved image version: ${version}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            TDL_VERSION=0.20.3
