name: Docker Hub Overview

# Sync docker/DOCKERHUB.md → Hub short description + full Overview without rebuilding images.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (same as Docker Publish).

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docker/DOCKERHUB.md"
      - "scripts/update_dockerhub_overview.py"
      - ".github/workflows/dockerhub-overview.yml"

permissions:
  contents: read

jobs:
  overview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub repository overview
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ifox2046
          DOCKERHUB_REPOSITORY: tg-downloader-ui
        run: python3 scripts/update_dockerhub_overview.py
